<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Submission - Tab</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('BG.png') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            position: relative;
            min-height: -webkit-fill-available;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
            z-index: 5;
        }

        .heading-image {
            position: absolute;
            top: 65px;
            left: 50%;
            transform: translateX(-50%);
            max-width: 80%;
            height: auto;
            z-index: 10;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
            color: #e0e0e0;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
            letter-spacing: 0.5px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }

        input:focus,
        textarea:focus {
            background: rgba(255, 255, 255, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.2);
        }

        input::placeholder,
        textarea::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        option {
            background-color: #2b3a4a;
            color: #ffffff;
        }

        textarea {
            height: 120px;
            resize: none;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: rgba(26, 115, 232, 0.85);
            backdrop-filter: blur(4px);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        button:hover {
            background-color: rgba(20, 87, 176, 0.9);
        }

        .success-msg {
            display: none;
            text-align: center;
            color: #28a745;
            font-weight: bold;
            margin-top: 1rem;
        }
    </style>
</head>

<body>
    <img src="Heading.png" class="heading-image" id="headingImg" alt="Heading" style="cursor: pointer;"
        title="Tap to toggle fullscreen">
    <div class="container">
        <form id="submitForm">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your name" required autocomplete="one-time-code" spellcheck="false">
            </div>
            <div class="form-group">
                <label for="department">Cluster</label>
                <input type="text" id="department" name="department" placeholder="Enter your Cluster" required autocomplete="one-time-code" spellcheck="false">
            </div>
            <div class="form-group">
                <select id="questionSelect"
                    style="appearance: none; -webkit-appearance: none; border: none; background: transparent; padding: 0; color: #e0e0e0; font-weight: bold; font-family: inherit; font-size: 1rem; text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5); letter-spacing: 0.5px; margin-bottom: 0.5rem; width: 100%; cursor: pointer; outline: none; white-space: normal;">
                    <option>What does winning in 2026 look like for CD?</option>
                    <option>What are you looking forward to in CD conference?</option>
                    <option>One word which comes to your mind when you think ‘HUL CD’?</option>
                </select>
                <textarea id="message" name="message" placeholder="Type your answer here..." required></textarea>
            </div>
            <button type="submit" id="submitBtn">Send Message</button>
            <div class="success-msg" id="successMsg">Message sent successfully!</div>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAM9YaUbHPp4X2OtsDknnq1Avf5xjEEVdc",
            authDomain: "wordcloudlive-e5387.firebaseapp.com",
            databaseURL: "https://wordcloudlive-e5387-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "wordcloudlive-e5387",
            storageBucket: "wordcloudlive-e5387.firebasestorage.app",
            messagingSenderId: "886258321259",
            appId: "1:886258321259:web:32d34e3a9b58087e372e2e"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        const form = document.getElementById('submitForm');
        const successMsg = document.getElementById('successMsg');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = {
                name: document.getElementById('name').value,
                department: document.getElementById('department').value,
                text: document.getElementById('message').value,
                timestamp: new Date().toISOString()
            };

            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';

            // Get Room ID from URL (e.g. ?room=1), default to 'main' if not provided
            const urlParams = new URLSearchParams(window.location.search);
            const roomId = urlParams.get('room') || 'main';

            try {
                // Instantly push the message to the cloud database under the specific room
                const messagesRef = ref(database, 'messages/' + roomId);
                await push(messagesRef, formData);

                successMsg.style.display = 'block';
                form.reset();
                setTimeout(() => {
                    successMsg.style.display = 'none';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Send Message';
                }, 3000);
            } catch (error) {
                console.error('Firebase Error:', error);
                alert('Connection error. Check your internet connection.');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send Message';
            }
        });

        // Fullscreen Toggle on Heading Click
        const headingImg = document.getElementById('headingImg');
        headingImg.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Error attempting to enable fullscreen: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        });
    </script>
</body>

</html>
