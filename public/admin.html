<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Admin Panel - Word Cloud</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 text-gray-800 font-[Inter] p-6">

    <div class="max-w-7xl mx-auto">
        <header class="mb-8 flex justify-between items-center bg-white p-6 rounded-xl shadow-sm border border-gray-100">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Word Cloud Command Center</h1>
                <p class="text-sm text-gray-500 mt-1">Manage all 6 setups in real-time</p>
            </div>
            <div id="status-indicator" class="flex items-center text-sm font-semibold text-green-600">
                <span class="w-3 h-3 bg-green-500 rounded-full mr-2 animate-pulse"></span>
                Connected to Cloud
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-8" id="room-cards-container">
            <!-- Cards generated by JS -->
        </div>

        <div id="data-view-section" class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 hidden">
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <h2 class="text-xl font-bold text-gray-800">Viewing Data: Room <span id="current-room-name"
                        class="text-blue-600"></span></h2>
                <div class="space-x-3">
                    <button id="download-csv-btn"
                        class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-lg text-sm font-semibold transition">📥
                        Export CSV</button>
                    <button id="clear-room-btn"
                        class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg text-sm font-semibold transition">🗑️
                        Clear Room</button>
                    <button id="close-view-btn"
                        class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-4 py-2 rounded-lg text-sm font-semibold transition">Close</button>
                </div>
            </div>

            <div class="overflow-x-auto">
                <table class="min-w-full text-left text-sm whitespace-nowrap">
                    <thead class="bg-gray-50 uppercase text-xs font-semibold text-gray-500">
                        <tr>
                            <th class="px-4 py-3 border-b">Time</th>
                            <th class="px-4 py-3 border-b">Message</th>
                            <th class="px-4 py-3 border-b text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-gray-100 text-gray-600">
                        <!-- Rows injected by JS -->
                    </tbody>
                </table>
                <div id="empty-state" class="text-center py-10 text-gray-500 hidden">
                    No submissions found for this room.
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAM9YaUbHPp4X2OtsDknnq1Avf5xjEEVdc",
            authDomain: "wordcloudlive-e5387.firebaseapp.com",
            databaseURL: "https://wordcloudlive-e5387-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "wordcloudlive-e5387",
            storageBucket: "wordcloudlive-e5387.firebasestorage.app",
            messagingSenderId: "886258321259",
            appId: "1:886258321259:web:32d34e3a9b58087e372e2e"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        // State
        let allData = {};
        const predefinedRooms = ['1', '2', '3', '4', '5', '6'];
        let activeRoomId = null;

        // UI Elements
        const container = document.getElementById('room-cards-container');
        const viewSection = document.getElementById('data-view-section');
        const tableBody = document.getElementById('table-body');
        const roomNameLabel = document.getElementById('current-room-name');
        const emptyState = document.getElementById('empty-state');
        const statusIndicator = document.getElementById('status-indicator');

        // Fetch All Data
        const dbRef = ref(database, 'messages');
        onValue(dbRef, (snapshot) => {
            allData = snapshot.val() || {};
            renderCards();
            if (activeRoomId) renderTable(activeRoomId);
        }, (error) => {
            statusIndicator.innerHTML = '<span class="w-3 h-3 bg-red-500 rounded-full mr-2"></span> Offline';
            statusIndicator.className = "flex items-center text-sm font-semibold text-red-600";
        });

        function renderCards() {
            container.innerHTML = '';

            predefinedRooms.forEach(roomId => {
                const roomData = allData[roomId] || {};
                const submissionsCount = Object.keys(roomData).length;

                const card = document.createElement('div');
                card.className = `bg-white border ${activeRoomId === roomId ? 'border-blue-500 ring-2 ring-blue-100' : 'border-gray-200'} rounded-xl p-6 shadow-sm hover:shadow-md transition cursor-pointer`;
                card.onclick = () => openRoom(roomId);

                card.innerHTML = `
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-lg font-bold text-gray-800">Room ${roomId}</h3>
                        <span class="bg-blue-100 text-blue-800 text-xs font-semibold px-2.5 py-0.5 rounded-full">${submissionsCount} words</span>
                    </div>
                    <div class="text-sm text-gray-500">
                        Links for setup:
                        <ul class="mt-2 text-xs font-mono bg-gray-50 p-2 rounded text-gray-600 space-y-1">
                            <li>📺 <a href="/desktop/?room=${roomId}" target="_blank" class="hover:underline text-blue-600 truncate inline-block w-full">/desktop?room=${roomId}</a></li>
                            <li>📱 <a href="/tab/?room=${roomId}" target="_blank" class="hover:underline text-blue-600 truncate inline-block w-full">/tab?room=${roomId}</a></li>
                        </ul>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function openRoom(roomId) {
            activeRoomId = roomId;
            renderCards(); // update border highlight
            viewSection.classList.remove('hidden');
            viewSection.scrollIntoView({ behavior: 'smooth' });
            renderTable(roomId);
        }

        function renderTable(roomId) {
            roomNameLabel.textContent = roomId;
            tableBody.innerHTML = '';

            const roomData = allData[roomId];
            if (!roomData) {
                emptyState.classList.remove('hidden');
                tableBody.parentElement.classList.add('hidden');
                return;
            }

            const messages = Object.entries(roomData).map(([id, val]) => ({ id, ...val }));
            messages.sort((a, b) => new Date(a.timestamp || 0) - new Date(b.timestamp || 0));

            if (messages.length === 0) {
                emptyState.classList.remove('hidden');
                tableBody.parentElement.classList.add('hidden');
            } else {
                emptyState.classList.add('hidden');
                tableBody.parentElement.classList.remove('hidden');

                messages.forEach(m => {
                    const row = document.createElement('tr');
                    const timeStr = m.timestamp ? new Date(m.timestamp).toLocaleTimeString() : '-';
                    row.innerHTML = `
                        <td class="px-4 py-3 ${!m.timestamp ? 'opacity-50' : ''}">${timeStr}</td>
                        <td class="px-4 py-3">${m.text || '-'}</td>
                        <td class="px-4 py-3 text-right">
                            <button onclick="window.deleteMsg('${roomId}', '${m.id}')" class="text-red-500 hover:text-red-700 bg-red-50 hover:bg-red-100 p-1.5 rounded transition">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 inline" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                </svg>
                            </button>
                        </td>
                    `;
                    tableBody.appendChild(row);
                });
            }
        }

        // Global functions for inline HTML events
        window.deleteMsg = async (roomId, msgId) => {
            if (confirm("Are you sure you want to permanently delete this message?")) {
                await remove(ref(database, 'messages/' + roomId + '/' + msgId));
            }
        };

        document.getElementById('close-view-btn').onclick = () => {
            viewSection.classList.add('hidden');
            activeRoomId = null;
            renderCards();
        };

        document.getElementById('clear-room-btn').onclick = async () => {
            if (!activeRoomId) return;
            if (confirm(`Are you absolutely sure you want to DELETE ALL messages in Room ${activeRoomId}?`)) {
                await remove(ref(database, 'messages/' + activeRoomId));
                viewSection.classList.add('hidden');
            }
        };

        document.getElementById('download-csv-btn').onclick = () => {
            if (!activeRoomId || !allData[activeRoomId]) {
                alert("No data to export.");
                return;
            }
            const data = Object.values(allData[activeRoomId]);
            const headers = "Message,Timestamp\n";
            const rows = data.map(m => {
                const cMsg = (m.text || '').replace(/,/g, ' ').replace(/\n/g, ' ');
                return `${cMsg},${m.timestamp || ''}`;
            });

            const blob = new Blob([headers + rows.join('\n')], { type: 'text/csv' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `wordcloud_room_${activeRoomId}.csv`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };
    </script>
</body>

</html>
